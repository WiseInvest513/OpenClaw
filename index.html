<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw - Wise Invest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0f172a; /* 现代深色主题 */
            color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- 顶部导航 -->
    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                    OpenClaw
                </span>
                <span class="text-slate-400 text-sm hidden sm:block border-l border-slate-700 pl-3">by Wise Invest</span>
            </div>
            <nav class="flex gap-6 text-sm font-medium text-slate-300">
                <a href="https://www.wise-invest.org/" class="hover:text-white transition-colors">返回主站</a>
                <a href="https://github.com/WiseInvest513/OpenClaw" target="_blank" class="hover:text-white transition-colors">GitHub</a>
            </nav>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="text-center space-y-6 max-w-2xl mx-auto">
            <div class="inline-flex items-center justify-center p-4 bg-blue-500/10 rounded-2xl mb-4">
                <svg class="w-16 h-16 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                </svg>
            </div>
            <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight text-white">
                OpenClaw 教程与指南
            </h1>
            <p class="text-xl sm:text-2xl text-slate-400 mt-4">
                内容正在开发中，敬请期待...
            </p>
            <div class="pt-10">
                <div class="inline-flex items-center gap-3 px-5 py-2.5 rounded-full bg-slate-800 text-sm font-medium text-slate-300 border border-slate-700 shadow-sm">
                    <span class="relative flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                    Site is under construction
                </div>
            </div>
        </div>
    </main>

    <!-- 底部信息 -->
    <footer class="border-t border-slate-800 bg-slate-900 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-slate-500">
            <p>&copy; 2026 Wise Invest. All rights reserved.</p>
            <p class="mt-2 text-xs">专注理性投资与 Web3 Alpha 探索</p>
        </div>
    </footer>
</body>
</html>
